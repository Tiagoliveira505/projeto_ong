<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <!-- Faz o site se adaptar ao celular -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ONG Solidária</title>

    <!-- IMPORTA O CSS DO HEADER (mesmo do index) -->

<body>

  <!-- BOTÃO MENU MOBILE -->
  <div class="menu-toggle" id="menu-toggle">
    ☰ <!-- botão hamburguer -->

  <!-- MENU -->

    <!-- ITENS DO MENU -->
    <div class="menu-item"><a href="#">Sobre Nós</a></div>

    <div class="menu-item"><a href="#">Presentear</a></div>

<main>

<!-- ================= FOOTER ================= -->
<footer>
    <p>© 2026 ONG Solidária • Todos os direitos reservados</p>
</footer>


<!-- ================= SCRIPTS ================= -->

<!-- SCRIPT DOS BONECOS (ANIMAÇÃO DO MENU) -->
<script src="index.js"></script>

<!-- SCRIPT DO MENU MOBILE -->
<script>
const toggle = document.getElementById("menu-toggle"); // botão ☰
const menu = document.getElementById("menu"); // menu

// quando clicar no botão
toggle.addEventListener("click", () => {
  menu.classList.toggle("active"); // abre/fecha menu no celular
});
</script>

</body>
</html>
